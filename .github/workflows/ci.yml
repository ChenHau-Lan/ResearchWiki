name: RKF CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex*"
      - "codex/**"

jobs:
  framework-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax
        run: >-
          python3 -m py_compile tools/rk.py tools/rkf_auto_connect.py
          tools/bootstrap_rkf.py tools/check_install.py tools/demo_quickstart.py
          tools/benchmark_rkf_ask.py
          tools/build_public_dashboard.py rkf/*.py tools/public_safety_scan.py
      - name: Onboarding contract
        run: |
          python3 -m unittest tests.test_rkf_onboarding_v1_2
          python3 tools/demo_quickstart.py --check
          python3 tools/benchmark_rkf_ask.py --check --documents 40 --canonical 12 --limit 5
      - name: CLI unit tests
        run: python3 -m unittest discover -s tests
      - name: Topic lint
        run: python3 tools/rk.py topic lint
      - name: Canonical schema
        run: python3 tools/validate_rkf_schema.py
      - name: RKF lint
        run: python3 tools/rk.py lint
      - name: Public safety scan
        run: python3 tools/public_safety_scan.py
